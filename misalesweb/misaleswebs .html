<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MISALES | Premium Digital Catalogue</title>
    <meta name="description" content="Browse premium Electronics, Home Appliances & Interior Decor. Order directly via WhatsApp.">
    <meta name="theme-color" content="#7B2FF7">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CSS Variables */
        :root {
            --primary: #7B2FF7;
            --primary-hover: #6320d4;
            --white: #FFFFFF;
            --black: #000000;
            --bg-light: #F5F5F7;
            --text-gray: #6E6E73;
            --border: #E5E5EA;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --wa-green: #25D366;
            --wa-dark: #128C7E;
            --radius-md: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* Reset & Base Setup */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        body { background-color: var(--bg-light); color: var(--black); line-height: 1.5; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* Header & Navigation */
        .header { position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); z-index: 1000; box-shadow: var(--shadow-sm); padding: 1rem; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; cursor: pointer; }
        .nav-icons { display: flex; gap: 1rem; font-size: 1.25rem; align-items: center; }
        .wa-contact-btn { background: var(--wa-green); color: var(--white); font-size: 0.85rem; font-weight: 600; padding: 0.4rem 0.8rem; border-radius: 20px; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
        
        /* Live Search */
        .search-container { position: relative; width: 100%; }
        .search-container i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-gray); }
        .search-bar { width: 100%; background: var(--bg-light); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.75rem 1rem 0.75rem 2.5rem; outline: none; font-size: 0.95rem; transition: var(--transition); }
        .search-bar:focus { border-color: var(--primary); background: var(--white); box-shadow: var(--shadow-sm); }

        /* Hero Section */
        .hero { margin: 1rem; padding: 3rem 1.5rem; text-align: center; color: var(--white); background: linear-gradient(135deg, #000000, #3a0ca3, #7B2FF7); border-radius: var(--radius-lg); overflow: hidden; }
        .hero h1 { font-size: 2rem; font-weight: 800; line-height: 1.2; margin-bottom: 0.75rem; }
        .hero p { font-size: 1rem; opacity: 0.9; }

        /* Category Pills (Filters) */
        .filter-container { position: sticky; top: 120px; background: var(--bg-light); z-index: 990; padding: 1rem 0; margin-bottom: 1rem; }
        .category-pills { display: flex; gap: 0.5rem; overflow-x: auto; padding: 0 1rem; scroll-snap-type: x mandatory; -ms-overflow-style: none; scrollbar-width: none; }
        .category-pills::-webkit-scrollbar { display: none; }
        .pill { background: var(--white); color: var(--text-gray); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 30px; font-size: 0.9rem; font-weight: 500; cursor: pointer; white-space: nowrap; scroll-snap-align: start; transition: var(--transition); }
        .pill.active { background: var(--primary); color: var(--white); border-color: var(--primary); box-shadow: 0 4px 12px rgba(123, 47, 247, 0.3); }

        /* Dynamic Product Grid */
        .product-grid { display: grid; gap: 1rem; padding: 0 1rem; }
        
        /* Product Card */
        .product-card { background: var(--white); border-radius: var(--radius-lg); padding: 1rem; display: flex; flex-direction: column; gap: 1rem; box-shadow: var(--shadow-sm); position: relative; }
        .product-header { display: flex; gap: 1rem; }
        .product-img { width: 120px; height: 120px; background: var(--bg-light); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .product-info { flex-grow: 1; display: flex; flex-direction: column; }
        .product-cat { font-size: 0.7rem; color: var(--text-gray); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 0.25rem; }
        .product-title { font-weight: 700; font-size: 1.1rem; line-height: 1.3; margin-bottom: 0.25rem; color: var(--black); }
        .product-desc { font-size: 0.8rem; color: var(--text-gray); margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-weight: 800; font-size: 1.2rem; color: var(--primary); margin-top: auto; }
        .stock-status { font-size: 0.75rem; color: var(--wa-green); display: flex; align-items: center; gap: 0.3rem; margin-top: 0.25rem; font-weight: 500; }
        
        /* Interactive Controls */
        .product-controls { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem; }
        .action-left { display: flex; align-items: center; gap: 1rem; }
        
        /* Heart Button */
        .btn-heart { background: transparent; border: none; font-size: 1.5rem; color: #ccc; cursor: pointer; transition: var(--transition); }
        .btn-heart:active { transform: scale(0.9); }
        
        /* Quantity Selector */
        .qty-selector { display: flex; align-items: center; background: var(--bg-light); border-radius: 20px; padding: 0.25rem; }
        .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--white); font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); }
        .qty-val { width: 30px; text-align: center; font-weight: 600; font-size: 0.9rem; }

        /* Action Buttons */
        .action-buttons { display: flex; gap: 0.5rem; width: 100%; margin-top: 0.5rem; }
        .btn { flex: 1; padding: 0.75rem; border-radius: var(--radius-md); font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; text-align: center; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: var(--transition); }
        .btn-add { background: var(--white); border: 1px solid var(--primary); color: var(--primary); }
        .btn-buy { background: var(--primary); color: var(--white); box-shadow: 0 4px 12px rgba(123, 47, 247, 0.2); }
        .btn-buy:active, .btn-add:active { transform: scale(0.98); }

        /* Floating WA Button */
        .floating-wa { position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px; background: var(--wa-green); color: var(--white); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); z-index: 999; cursor: pointer; transition: var(--transition); }
        .floating-wa:hover { transform: translateY(-5px); }

        /* Mobile Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 0.75rem 0; z-index: 1000; padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; color: var(--text-gray); font-size: 0.7rem; cursor: pointer; transition: var(--transition); border: none; background: transparent; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.25rem; }

        /* Empty State */
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-gray); }
        .empty-state i { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

        /* Desktop Adjustments */
        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); padding: 0 2rem; }
            .hero { margin: 2rem; }
            .category-pills { padding: 0 2rem; justify-content: center; }
            .bottom-nav { display: none; }
            body { padding-bottom: 0; }
        }
        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); max-width: 1200px; margin: 0 auto; }
            .hero { max-width: 1160px; margin: 2rem auto; }
        }
        
        /* Loading Spinner */
        .loader-container { text-align: center; padding: 4rem; color: var(--primary); }
    </style>
</head>
<body id="top">

    <header class="header">
        <div class="nav-top">
            <div class="logo" onclick="scrollToTop()">MISALES.</div>
            <div class="nav-icons">
                <div class="wa-contact-btn" onclick="openWhatsApp('Hello MISALES, I am interested in your catalogue. Please assist me.')">
                    <i class="fa-brands fa-whatsapp"></i> Contact Seller
                </div>
            </div>
        </div>
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search products, categories...">
        </div>
    </header>

    <section class="hero" id="hero-section">
        <h1>KAMPALA ELECTRIC SHOWROOM</h1>
        <p>Scroll the catalogue and order directly via WhatsApp.</p>
    </section>

    <div class="filter-container">
        <div class="category-pills" id="categoryPills">
            <button class="pill active" data-filter="All">All Products</button>
            <button class="pill" data-filter="VELLMAX">VELLMAX</button>
            <button class="pill" data-filter="NELUX">NELUX</button>
            <button class="pill" data-filter="PANDA">PANDA</button>
            <button class="pill" data-filter="RICHUN">RICHUN</button>
            <button class="pill" data-filter="HIFI LITE">HIFI LITE</button>
            <button class="pill" data-filter="PHILLA">PHILLA</button>
            <button class="pill" data-filter="VGT">VGT</button>
            <button class="pill" data-filter="ELEPHANT">ELEPHANT</button>
            <button class="pill" data-filter="AFN LIGHTS">AFN LIGHTS</button> 
            <button class="pill" data-filter="VAL LIGHT">VAL LIGHT</button>
            <button class="pill" data-filter="C-TORCH">C-TORCH</button>
            <button class="pill" data-filter="VALTRIC">VALTRIC</button>
            <button class="pill" data-filter="AVC">AVC</button>
            <button class="pill" data-filter="DP LIGHT">DP LIGHT</button>
            <button class="pill" data-filter="MSK LIGHTS">MSK LIGHTS</button>
        </div>
    </div>

    <main class="product-grid" id="productGrid">
        <div class="loader-container">
            <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
            <p style="margin-top: 1rem; color: var(--text-gray);">Loading catalogue...</p>
        </div>
    </main>

    <div class="floating-wa" onclick="openWhatsApp('Hello MISALES, I need help navigating your catalogue.')">
        <i class="fa-brands fa-whatsapp"></i>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="scrollToTop()">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="document.querySelector('#searchInput').focus()">
            <i class="fa-solid fa-magnifying-glass"></i>
            <span>Search</span>
        </button>
        <button class="nav-item" style="color: var(--wa-green)" onclick="openWhatsApp('Hello MISALES, I need customer support.')">
            <i class="fa-brands fa-whatsapp"></i>
            <span>Chat</span>
        </button>
    </nav>

    <script>
        // WhatsApp Configuration
        const WA_NUMBER = "+256700964242";
        const WA_BASE_URL = `https://wa.me/${WA_NUMBER.replace('+', '')}?text=`;

        // Global variable to hold data fetched from JSON
        let productsDatabase = [];

        // Core Functions
        const openWhatsApp = (message) => {
            window.open(WA_BASE_URL + encodeURIComponent(message), '_blank');
        };

        const scrollToTop = () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.nav-item').classList.add('active');
        };

        // Render Engine
        const grid = document.getElementById('productGrid');
        
        const renderProducts = (products) => {
            grid.innerHTML = '';
            if(products.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="fa-solid fa-box-open"></i><h2>No products found</h2><p>Try adjusting your search or filters.</p></div>`;
                return;
            }

            products.forEach(prod => {
                const stockColor = prod.stock === 'In Stock' ? 'var(--wa-green)' : (prod.stock === 'Pre-order' ? '#FF9500' : '#FF3B30');
                
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-header">
                        <div class="product-img">
                            <img src="${prod.image}" alt="${prod.name}" onerror="this.src='https://placehold.co/120x120/E5E5EA/7B2FF7?text=No+Image'">
                        </div>
                        <div class="product-info">
                            <span class="product-cat">${prod.category}</span>
                            <h3 class="product-title">${prod.name}</h3>
                            <p class="product-desc">${prod.description}</p>
                            <div class="product-price">${prod.price}</div>
                            <div class="stock-status" style="color: ${stockColor}">
                                <i class="fa-solid fa-circle-check"></i> ${prod.stock}
                            </div>
                        </div>
                    </div>
                    
                    <div class="product-controls">
                        <div class="action-left">
                            <button class="btn-heart" title="Like this item" onclick="triggerHeart('${prod.name.replace(/'/g, "\\'")}')">
                                <i class="fa-solid fa-heart" style="color: #FF3B30;"></i>
                            </button>
                            <div class="qty-selector">
                                <button class="qty-btn" onclick="updateQty('${prod.id}', -1)">-</button>
                                <span class="qty-val" id="qty-${prod.id}">1</span>
                                <button class="qty-btn" onclick="updateQty('${prod.id}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-add" onclick="triggerAddToCart('${prod.id}', '${prod.name.replace(/'/g, "\\'")}')">
                            <i class="fa-solid fa-cart-plus"></i> Add
                        </button>
                        <button class="btn btn-buy" onclick="triggerBuyNow('${prod.name.replace(/'/g, "\\'")}')">
                            <i class="fa-brands fa-whatsapp"></i> Buy Now
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        // UI Interactions
        window.updateQty = (id, change) => {
            const el = document.getElementById(`qty-${id}`);
            let val = parseInt(el.innerText) + change;
            if(val < 1) val = 1;
            el.innerText = val;
        };

        // WhatsApp Triggers
        window.triggerHeart = (productName) => {
            const msg = `Hello MISALES, I liked this item:\n${productName}\nPlease send me more details.`;
            openWhatsApp(msg);
        };

        window.triggerAddToCart = (id, productName) => {
            const qty = document.getElementById(`qty-${id}`).innerText;
            const msg = `Hello MISALES,\nI would like to order:\nProduct:\n${productName}\nQuantity:\n${qty}\nPlease confirm availability.`;
            openWhatsApp(msg);
        };

        window.triggerBuyNow = (productName) => {
            const msg = `Hello MISALES,\nI am interested in buying:\n${productName}\nPlease guide me through the ordering process.`;
            openWhatsApp(msg);
        };

        // Search & Filter Logic
        let currentFilter = 'All';
        let searchQuery = '';

        const filterData = () => {
            let filtered = productsDatabase;
            if (currentFilter !== 'All') {
                filtered = filtered.filter(p => p.category === currentFilter);
            }
            if (searchQuery) {
                const lowerQ = searchQuery.toLowerCase();
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(lowerQ) || 
                    p.category.toLowerCase().includes(lowerQ)
                );
            }
            renderProducts(filtered);
        };

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterData();
        });

        document.querySelectorAll('.pill').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                filterData();
            });
        });

        // ----------------------------------------------------
        // FETCH DATA FROM EXTERNAL JSON FILE
        // ----------------------------------------------------
        const loadProducts = async () => {
            try {
                // Fetches from products.json in the same folder
                const response = await fetch('products(1).json');
                
                if (!response.ok) {
                    throw new Error(`Failed to load data. Status: ${response.status}`);
                }
                
                productsDatabase = await response.json();
                renderProducts(productsDatabase);
                
            } catch (error) {
                console.error("Error fetching products:", error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-triangle-exclamation" style="color: #FF3B30;"></i>
                        <h2>Catalogue Offline</h2>
                        <p style="margin-top: 0.5rem; font-size: 0.9rem;">
                            Make sure <strong>products(1).json</strong> is in the same folder as this file.<br><br>
                            <em>Note: If you are opening this directly from your computer (file://), your browser might block the data from loading due to security settings. To view it locally, you need to use a local development server or deploy it to a live environment (like GitHub Pages).</em>
                        </p>
                    </div>`;
            }
        };

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
        });

    </script>
</body>
</html>
